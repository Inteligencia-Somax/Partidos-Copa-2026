<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palpites Mundial 2026 — Somax Agro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --red:    #CE1126;
  --red2:   #FF3A4A;
  --blue:   #0038A8;
  --blue2:  #1A6FD4;
  --gold:   #FFD700;
  --gold2:  #FFA500;
  --green:  #4CAF50;
  --dark:   #04060F;
  --card:   #080E20;
  --card2:  #0A1228;
  --border: #162040;
  --text:   #EEF2FF;
  --muted:  #6A7FA8;
  --white:  #FFFFFF;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:'Barlow',sans-serif;
  color:var(--text);
  background:var(--dark);
  min-height:100vh;
  overflow-x:hidden;
}

/* ═══════════════════════════════════════════
   HERO — Estadio épico con copa
═══════════════════════════════════════════ */
.hero{
  position:relative;
  padding: 5px 0 0;
  overflow:hidden;
  background: linear-gradient(180deg,
    #0A2A6E 0%,
    #0D3A8A 15%,
    #0B2A6A 30%,
    #0A1A40 55%,
    #080E20 75%,
    var(--dark) 100%
  );
}

/* Atmospheric layers */
.atm-sky{
  position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 140% 50% at 50% -5%,
      rgba(30,100,220,0.55) 0%,
      rgba(10,50,140,0.3) 40%,
      transparent 65%
    );
}
.atm-sun{
  position:absolute;top:-40px;left:50%;transform:translateX(-50%);
  width:280px;height:280px;
  background:radial-gradient(circle,
    rgba(255,220,60,0.35) 0%,
    rgba(255,160,30,0.18) 35%,
    rgba(255,100,20,0.08) 55%,
    transparent 70%
  );
  pointer-events:none;
}
.atm-fire{
  position:absolute;bottom:0;left:0;right:0;height:60%;
  background:
    radial-gradient(ellipse 140% 80% at 50% 120%,
      rgba(255,80,10,0.55) 0%,
      rgba(200,30,10,0.3) 28%,
      rgba(150,10,5,0.12) 50%,
      transparent 68%
    );
  pointer-events:none;
}
.atm-rays{
  position:absolute;inset:0;pointer-events:none;
  background:conic-gradient(from 270deg at 50% -5%,
    transparent 0deg,
    rgba(255,210,50,0.055) 5deg,transparent 10deg,
    rgba(255,210,50,0.04)  15deg,transparent 21deg,
    rgba(255,210,50,0.05)  27deg,transparent 33deg,
    rgba(255,210,50,0.035) 40deg,transparent 47deg,
    rgba(255,210,50,0.045) 55deg,transparent 63deg,
    rgba(255,210,50,0.03)  72deg,transparent 82deg,
    rgba(255,210,50,0.04)  92deg,transparent 180deg
  );
}

/* Confetti */
.confetti-layer{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.cf{position:absolute;border-radius:2px;animation:cfFall linear infinite;}
@keyframes cfFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:0;}
  8%{opacity:.8;}
  92%{opacity:.6;}
  100%{transform:translateY(500px) rotate(620deg);opacity:0;}
}

/* PY stripe */
.stripe{position:absolute;left:0;right:0;height:6px;z-index:20;}
.stripe.top{top:0;
  background:linear-gradient(90deg,var(--red) 33%,#fff 33%,#fff 67%,var(--blue) 67%);}
.stripe.bot{bottom:0;
  background:linear-gradient(90deg,var(--blue) 33%,#fff 33%,#fff 67%,var(--red) 67%);}

/* Hero inner */
.hero-inner{
  position:relative;z-index:5;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;padding:32px 20px 44px;
  gap:0;
}

/* Logo glass pill */
.logo-pill{
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.13);
  border-radius:100px;padding:11px 32px;
  margin-bottom:22px;
  box-shadow:0 4px 30px rgba(0,0,0,0.5),0 0 50px rgba(255,215,0,0.07);
}
.logo-pill img{height:46px;display:block;filter:drop-shadow(0 0 14px rgba(255,255,255,0.25));}

/* Trophy */
.trophy{
  font-size:80px;line-height:1;
  margin-bottom:8px;
  filter:drop-shadow(0 0 30px rgba(255,200,30,0.8)) drop-shadow(0 6px 20px rgba(0,0,0,0.9));
  animation:tFloat 3.5s ease-in-out infinite;
  display:block;
}
@keyframes tFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}

/* Title */
.hero-title{font-family:'Bebas Neue',sans-serif;line-height:.88;letter-spacing:3px;margin-bottom:16px;}
.ht-pre{
  display:block;font-size:clamp(12px,2.5vw,17px);
  color:rgba(255,255,255,.55);letter-spacing:10px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  text-transform:uppercase;margin-bottom:4px;
}
.ht-somax{
  display:block;font-size:clamp(72px,20vw,140px);
  color:#fff;letter-spacing:6px;
  text-shadow:
    0 0 80px rgba(255,215,0,.55),
    0 0 40px rgba(255,215,0,.3),
    4px 4px 0 rgba(0,0,0,.9),
    8px 8px 0 rgba(0,0,0,.4);
}
.ht-agro{
  display:block;font-size:clamp(16px,4vw,28px);
  color:rgba(255,255,255,.6);letter-spacing:18px;
  font-family:'Barlow Condensed',sans-serif;font-weight:800;
  text-transform:uppercase;margin-bottom:2px;
}
.ht-pres{
  display:block;font-size:clamp(11px,2vw,14px);
  color:var(--gold);letter-spacing:6px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  text-transform:uppercase;text-shadow:0 0 20px rgba(255,215,0,.8);
  margin-bottom:14px;
}
.ht-mundial{
  display:block;font-size:clamp(44px,12vw,86px);
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 40%,#FF6B00 75%,var(--red) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 4px 16px rgba(255,150,0,.55));
  letter-spacing:5px;
}

/* Flags */
.flags{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;}
.flag-em{font-size:28px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.7));}
.flag-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.25);}

/* Date chip */
.date-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(0,0,0,.55);backdrop-filter:blur(10px);
  border:1px solid rgba(255,215,0,.28);border-radius:50px;
  padding:7px 22px;
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:2px;color:var(--gold);
  box-shadow:0 0 24px rgba(255,215,0,.12);
}

/* ═══════════════════════════════════════════
   TABS
═══════════════════════════════════════════ */
.tabs-wrap{
  background:rgba(4,6,15,.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 16px;position:sticky;top:0;z-index:100;
}
.tabs{display:flex;max-width:700px;margin:0 auto;}
.tab-btn{
  flex:1;padding:16px 10px;background:transparent;border:none;
  border-bottom:3px solid transparent;color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .25s;
}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab-btn:hover:not(.active){color:var(--text);}

/* ═══════════════════════════════════════════
   MAIN
═══════════════════════════════════════════ */
.main{max-width:700px;margin:0 auto;padding:24px 14px 80px;}
.panel{display:none;}
.panel.active{display:block;animation:fadeUp .35s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════════════
   INLINE ERROR / SUCCESS BANNER
═══════════════════════════════════════════ */
.banner{
  display:none;align-items:center;gap:12px;
  padding:14px 20px;border-radius:14px;margin-bottom:16px;
  font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;
  letter-spacing:1px;animation:fadeUp .3s ease;
}
.banner.show{display:flex;}
.banner.error{
  background:rgba(206,17,38,.18);border:1.5px solid rgba(206,17,38,.5);color:#FF9090;
  box-shadow:0 0 24px rgba(206,17,38,.15);
}
.banner.success{
  background:rgba(76,175,80,.18);border:1.5px solid rgba(76,175,80,.5);color:#90EE90;
  box-shadow:0 0 24px rgba(76,175,80,.15);
}
.banner-icon{font-size:22px;flex-shrink:0;}
.banner-close{
  margin-left:auto;background:none;border:none;color:inherit;
  font-size:18px;cursor:pointer;opacity:.7;padding:0 4px;
}
.banner-close:hover{opacity:1;}

/* Missing highlight on cards */
.match-card.missing{
  border-color:rgba(206,17,38,.6)!important;
  box-shadow:0 0 0 2px rgba(206,17,38,.25), 0 0 30px rgba(206,17,38,.15)!important;
  animation:shake .4s ease;
}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-6px);}
  40%{transform:translateX(6px);}
  60%{transform:translateX(-4px);}
  80%{transform:translateX(4px);}
}
.missing-tag{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(206,17,38,.2);border:1px solid rgba(206,17,38,.5);
  color:#FF9090;font-size:9px;font-weight:800;
  letter-spacing:1px;padding:3px 10px;border-radius:20px;
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;
}

/* ═══════════════════════════════════════════
   FORM CARD
═══════════════════════════════════════════ */
.form-card{
  background:linear-gradient(145deg,rgba(255,255,255,.035),rgba(255,255,255,.01));
  border:1px solid var(--border);border-radius:20px;
  padding:24px;margin-bottom:20px;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  position:relative;overflow:hidden;
}
.form-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--red),var(--gold),var(--blue));
}
.form-card h2{
  font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;
  color:var(--gold);margin-bottom:16px;
  text-shadow:0 0 20px rgba(255,215,0,.4);
}
.field{margin-bottom:14px;}
.field label{
  display:block;font-size:10px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;
  font-family:'Barlow Condensed',sans-serif;
}
.field input{
  width:100%;background:rgba(0,0,0,.4);
  border:1.5px solid var(--border);border-radius:12px;
  padding:13px 18px;color:var(--text);
  font-family:'Barlow',sans-serif;font-size:15px;font-weight:600;
  transition:all .2s;
}
.field input:focus{
  outline:none;border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(255,215,0,.1);
  background:rgba(255,215,0,.03);
}
.field input::placeholder{color:var(--muted);}
.field input.inp-error{border-color:var(--red);box-shadow:0 0 0 3px rgba(206,17,38,.12);}

/* ═══════════════════════════════════════════
   SECTION LABEL
═══════════════════════════════════════════ */
.sec-label{
  display:flex;align-items:center;gap:10px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:4px;
  text-transform:uppercase;color:var(--muted);margin-bottom:16px;
}
.sec-label::before,.sec-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* ═══════════════════════════════════════════
   MATCH CARDS
═══════════════════════════════════════════ */
.match-card{
  border:1px solid var(--border);border-radius:20px;
  padding:20px;margin-bottom:14px;
  position:relative;overflow:hidden;
  transition:transform .2s,box-shadow .2s,border-color .3s;
  box-shadow:0 4px 24px rgba(0,0,0,.6);
}

/* Per-card gradient backgrounds inspired by stadium photo */
.match-card.c0{background:linear-gradient(145deg,#0D1E3A 0%,#081220 100%);}
.match-card.c1{background:linear-gradient(145deg,#1A100A 0%,#0E0806 100%);}
.match-card.c2{background:linear-gradient(145deg,#180820 0%,#0C0514 100%);}
.match-card.c3{background:linear-gradient(145deg,#071A10 0%,#040E08 100%);}
.match-card.c4{background:linear-gradient(145deg,#0A0F2A 0%,#060914 100%);}

/* Glow accent top border per card */
.match-card.c0::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(100,180,255,.6),transparent);}
.match-card.c1::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(255,130,50,.6),transparent);}
.match-card.c2::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--red),var(--white) 50%,var(--blue));}
.match-card.c3::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(80,200,100,.6),transparent);}
.match-card.c4::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(255,215,0,.6),transparent);}

.match-card:hover{
  transform:translateY(-3px);
  box-shadow:0 16px 50px rgba(0,0,0,.7),0 0 40px rgba(255,215,0,.05);
  border-color:rgba(255,215,0,.15);
}
.match-card.py-match{
  background:linear-gradient(145deg,#1A0820 0%,#0C0514 100%);
  border-color:rgba(206,17,38,.35);
  box-shadow:0 0 50px rgba(206,17,38,.1),0 4px 24px rgba(0,0,0,.6);
}
/* Big watermark number */
.match-card::after{
  content:attr(data-n);
  position:absolute;right:-8px;bottom:-18px;
  font-family:'Bebas Neue',sans-serif;font-size:100px;
  color:rgba(255,255,255,.025);letter-spacing:0;
  pointer-events:none;line-height:1;
}

.match-header{
  display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:16px;
}
.match-num{
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:3px;color:var(--muted);text-transform:uppercase;
}
.mh-space{flex:1;}
.match-date{
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:1px;color:var(--muted);
}
.match-group{
  font-size:10px;font-weight:700;letter-spacing:1px;
  background:rgba(255,255,255,.06);color:var(--text);
  padding:3px 10px;border-radius:20px;border:1px solid var(--border);
  font-family:'Barlow Condensed',sans-serif;
}
.py-tag{
  display:inline-flex;align-items:center;gap:4px;
  background:linear-gradient(90deg,rgba(206,17,38,.3),rgba(0,56,168,.3));
  border:1px solid rgba(206,17,38,.5);color:#FF9090;
  font-size:9px;font-weight:800;letter-spacing:2px;
  padding:3px 10px;border-radius:20px;text-transform:uppercase;
  font-family:'Barlow Condensed',sans-serif;
  animation:glowPY 2s ease-in-out infinite;
}
@keyframes glowPY{
  0%,100%{box-shadow:0 0 8px rgba(206,17,38,.2);}
  50%{box-shadow:0 0 22px rgba(206,17,38,.55);}
}

/* Teams */
.teams-row{
  display:grid;grid-template-columns:1fr 56px 1fr;
  align-items:center;gap:8px;margin-bottom:14px;
}
.team-pick{display:flex;flex-direction:column;align-items:center;gap:6px;}

/* Country code badge instead of flag emoji — big and sporty */
.team-code{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(28px,7vw,40px);
  letter-spacing:2px;
  color:var(--white);
  text-shadow:0 2px 10px rgba(0,0,0,.8);
  line-height:1;
}
.team-flag-em{
  font-size:clamp(26px,6vw,34px);
  filter:drop-shadow(0 3px 8px rgba(0,0,0,.7));
  line-height:1;
}
.team-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;text-align:center;
  letter-spacing:2px;text-transform:uppercase;color:var(--muted);
}
.pick-btn{
  width:100%;padding:9px 6px;
  border-radius:10px;border:1.5px solid var(--border);
  background:rgba(255,255,255,.04);color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;font-size:11px;
  font-weight:700;letter-spacing:2px;cursor:pointer;
  transition:all .2s;text-transform:uppercase;
}
.pick-btn:hover:not(.sel-home):not(.sel-away){
  background:rgba(255,255,255,.08);color:var(--text);border-color:#2a3a6a;
}
.pick-btn.sel-home{
  border-color:var(--red2);
  background:linear-gradient(135deg,rgba(206,17,38,.28),rgba(206,17,38,.08));
  color:#FF9090;
  box-shadow:0 0 22px rgba(206,17,38,.4);
}
.pick-btn.sel-away{
  border-color:#4E9FFF;
  background:linear-gradient(135deg,rgba(0,56,168,.35),rgba(0,56,168,.1));
  color:#90C8FF;
  box-shadow:0 0 22px rgba(0,56,168,.45);
}

.vs-orb{
  width:50px;height:50px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,215,0,.12) 0%,transparent 70%);
  border:1px solid rgba(255,215,0,.18);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:16px;color:rgba(255,215,0,.7);
  letter-spacing:1px;
  box-shadow:0 0 20px rgba(255,215,0,.08);
}

.draw-row{text-align:center;margin-bottom:14px;}
.draw-btn{
  padding:9px 32px;border-radius:30px;
  border:1.5px solid var(--border);background:rgba(255,255,255,.03);color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:3px;cursor:pointer;transition:all .2s;text-transform:uppercase;
}
.draw-btn:hover:not(.sel-draw){background:rgba(255,255,255,.07);color:var(--text);border-color:#2a3a6a;}
.draw-btn.sel-draw{
  border-color:#6DC440;
  background:linear-gradient(135deg,rgba(109,196,64,.2),rgba(109,196,64,.06));
  color:#A0E870;
  box-shadow:0 0 22px rgba(109,196,64,.3);
}

/* Goals */
.goals-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.goals-field label{
  display:block;font-size:9px;font-weight:700;
  letter-spacing:3px;color:var(--muted);text-transform:uppercase;
  margin-bottom:6px;font-family:'Barlow Condensed',sans-serif;
}
.goals-input{
  display:flex;align-items:center;
  background:rgba(0,0,0,.45);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
}
.goals-input button{
  width:40px;height:42px;background:transparent;border:none;
  color:var(--muted);font-size:24px;cursor:pointer;
  transition:all .2s;line-height:1;font-weight:900;font-family:'Barlow',sans-serif;
}
.goals-input button:hover{background:rgba(255,255,255,.07);color:var(--text);}
.goals-input span{
  flex:1;text-align:center;
  font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--text);
}

/* ═══════════════════════════════════════════
   SUBMIT
═══════════════════════════════════════════ */
.submit-btn{
  width:100%;padding:19px;
  background:linear-gradient(135deg,#CE1126 0%,#8B0000 50%,#1A006B 100%);
  border:none;border-radius:16px;color:#fff;
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:5px;
  cursor:pointer;transition:all .25s;margin-top:12px;
  box-shadow:0 6px 32px rgba(206,17,38,.5),inset 0 1px 0 rgba(255,255,255,.1);
  position:relative;overflow:hidden;
}
.submit-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.14) 0%,transparent 55%);
}
.submit-btn:hover{transform:translateY(-3px);box-shadow:0 12px 44px rgba(206,17,38,.6);}
.submit-btn:active{transform:translateY(0);}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
.toast{
  position:fixed;bottom:30px;left:50%;
  transform:translateX(-50%) translateY(20px);
  color:#fff;padding:14px 32px;border-radius:50px;
  font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;
  letter-spacing:2px;opacity:0;transition:all .35s;
  z-index:9999;pointer-events:none;white-space:nowrap;
}
.toast.success-t{
  background:linear-gradient(135deg,#1A6FD4,#0A3A8A);
  box-shadow:0 8px 32px rgba(0,56,168,.55),0 0 0 1px rgba(255,215,0,.2);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ═══════════════════════════════════════════
   REPORT
═══════════════════════════════════════════ */
.report-top{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:20px;flex-wrap:wrap;gap:12px;
}
.report-top h2{
  font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;
  color:var(--gold);text-shadow:0 0 30px rgba(255,215,0,.4);
}
.report-count{
  font-size:11px;color:var(--muted);font-weight:700;margin-top:3px;
  letter-spacing:2px;font-family:'Barlow Condensed',sans-serif;
}
.export-btn{
  padding:10px 20px;background:transparent;
  border:1.5px solid rgba(255,215,0,.4);border-radius:10px;
  color:var(--gold);font-family:'Barlow Condensed',sans-serif;
  font-size:12px;font-weight:700;letter-spacing:3px;
  cursor:pointer;text-transform:uppercase;transition:all .2s;
}
.export-btn:hover{background:rgba(255,215,0,.08);border-color:var(--gold);}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.stat-card{
  background:linear-gradient(145deg,#0C1830,#07101E);
  border:1px solid var(--border);border-radius:16px;
  padding:16px;text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}
.stat-num{
  font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:1px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.stat-label{
  font-size:9px;font-weight:700;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;margin-top:2px;
  font-family:'Barlow Condensed',sans-serif;
}

.filter-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.filter-select{
  background:rgba(0,0,0,.4);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;color:var(--text);
  font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;flex:1;min-width:130px;
}
.filter-select:focus{outline:none;border-color:var(--gold);}

/* Summary */
.match-summary{
  background:linear-gradient(145deg,#0C1830,#07101E);
  border:1px solid var(--border);border-radius:16px;
  padding:18px;margin-bottom:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  position:relative;overflow:hidden;
}
.match-summary::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--red),var(--gold),var(--blue));
}
.sum-hdr{
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px;font-weight:700;letter-spacing:2px;
  color:var(--text);margin-bottom:14px;text-transform:uppercase;
}
.win-bars{display:flex;flex-direction:column;gap:10px;}
.bar-row{display:flex;align-items:center;gap:10px;}
.bar-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;color:var(--muted);font-weight:700;min-width:95px;letter-spacing:1px;
}
.bar-track{
  flex:1;background:rgba(0,0,0,.5);border-radius:6px;
  height:10px;overflow:hidden;border:1px solid rgba(255,255,255,.04);
}
.bar-fill{height:100%;border-radius:6px;transition:width .8s cubic-bezier(.4,0,.2,1);}
.bar-home{background:linear-gradient(90deg,var(--red),var(--red2));}
.bar-draw{background:linear-gradient(90deg,#3A8A20,#6DC440);}
.bar-away{background:linear-gradient(90deg,var(--blue),var(--blue2));}
.bar-pct{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text);min-width:42px;text-align:right;}

/* Pred cards */
.predictions-list{display:flex;flex-direction:column;gap:12px;}
.pred-card{
  background:linear-gradient(145deg,#0C1830,#07101E);
  border:1px solid var(--border);border-radius:18px;
  padding:18px;animation:fadeUp .3s ease;
  box-shadow:0 4px 20px rgba(0,0,0,.5);transition:all .2s;
}
.pred-card:hover{border-color:rgba(255,215,0,.18);box-shadow:0 8px 32px rgba(0,0,0,.6);}
.pred-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;}
.pred-avatar{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--red),var(--blue));
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:19px;color:#fff;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
}
.pred-info{flex:1;}
.pred-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#fff;}
.pred-ts{font-size:10px;color:var(--muted);margin-top:2px;font-weight:600;letter-spacing:1px;}
.del-btn{
  background:none;border:none;color:rgba(255,255,255,.12);
  font-size:16px;cursor:pointer;padding:4px 8px;
  border-radius:6px;transition:all .2s;line-height:1;
}
.del-btn:hover{color:var(--red);background:rgba(206,17,38,.12);}
.pred-picks-grid{display:flex;flex-direction:column;gap:7px;}
.pred-row{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.05);
  border-radius:10px;padding:8px 14px;gap:8px;
}
.pred-mlbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--muted);font-weight:700;letter-spacing:2px;min-width:28px;}
.pred-winner{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;flex:1;}
.pred-score{
  font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;
  color:var(--gold);background:rgba(255,215,0,.08);
  border:1px solid rgba(255,215,0,.15);padding:2px 12px;border-radius:8px;
  text-shadow:0 0 12px rgba(255,215,0,.4);
}

.empty-state{text-align:center;padding:70px 20px;color:var(--muted);}
.empty-ball{font-size:64px;margin-bottom:16px;animation:bounce 1.5s ease-in-out infinite;display:block;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}
.empty-state p{font-size:15px;line-height:1.8;font-weight:600;}

@media(max-width:480px){
  .teams-row{grid-template-columns:1fr 44px 1fr;}
  .team-code{font-size:24px;}
  .team-flag-em{font-size:24px;}
  .goals-row{grid-template-columns:1fr;}
  .stats-row{grid-template-columns:1fr 1fr;}
}
</style>
</head>

// ── Data ──
const MATCHES=[
  {num:1,date:'Jue 11 Jun',group:'Grupo A',home:'México',  homeFlag:'🇲🇽',homeCode:'MX',away:'Sudáfrica',    awayFlag:'🇿🇦',awayCode:'SA',py:false,c:'c0'},
  {num:2,date:'Vie 12 Jun',group:'Grupo B',home:'Canadá',  homeFlag:'🇨🇦',homeCode:'CA',away:'Bosnia y Herz.',awayFlag:'🇧🇦',awayCode:'BA',py:false,c:'c1'},
  {num:3,date:'Vie 12 Jun',group:'Grupo D',home:'EE.UU.',  homeFlag:'🇺🇸',homeCode:'US',away:'Paraguay',     awayFlag:'🇵🇾',awayCode:'PY',py:true, c:'c2'},
  {num:4,date:'Sáb 13 Jun',group:'Grupo C',home:'Brasil',  homeFlag:'🇧🇷',homeCode:'BR',away:'Marruecos',    awayFlag:'🇲🇦',awayCode:'MA',py:false,c:'c3'},
  {num:5,date:'Sáb 13 Jun',group:'Grupo B',home:'Qatar',   homeFlag:'🇶🇦',homeCode:'QA',away:'Suiza',        awayFlag:'🇨🇭',awayCode:'CH',py:false,c:'c4'},
];
const picks=MATCHES.map(()=>({winner:null,homeGoals:0,awayGoals:0}));
function load(){try{return JSON.parse(localStorage.getItem('somax26v3')||'[]');}catch{return[];}}
function save(a){localStorage.setItem('somax26v3',JSON.stringify(a));}

// ── Build form ──
function buildMatches(){
  const container = document.getElementById('matches-container');
  container.innerHTML = '';

  MATCHES.forEach((m, i) => {
    // Create card element
    const card = document.createElement('div');
    card.className = 'match-card ' + m.c + (m.py ? ' py-match' : '');
    card.id = 'mc-' + i;
    card.setAttribute('data-n', m.num);

    card.innerHTML = `
      <div class="match-header">
        <span class="match-num">Partido ${m.num}</span>
        <div class="mh-space"></div>
        <span class="match-date">${m.date}</span>&nbsp;
        <span class="match-group">${m.group}</span>
        ${m.py ? '<span class="py-tag">🇵🇾 ¡Paraguay!</span>' : ''}
        <span class="missing-tag" id="miss-${i}" style="display:none">⚠ Falta seleccionar</span>
      </div>
      <div class="teams-row">
        <div class="team-pick">
          <div class="team-flag-em">${m.homeFlag}</div>
          <div class="team-code">${m.homeCode}</div>
          <div class="team-name">${m.home}</div>
          <button class="pick-btn" id="btn-home-${i}">⚽ Local</button>
        </div>
        <div class="vs-orb">VS</div>
        <div class="team-pick">
          <div class="team-flag-em">${m.awayFlag}</div>
          <div class="team-code">${m.awayCode}</div>
          <div class="team-name">${m.away}</div>
          <button class="pick-btn" id="btn-away-${i}">⚽ Visita</button>
        </div>
      </div>
      <div class="draw-row">
        <button class="draw-btn" id="btn-draw-${i}">🤝 Empate (opcional)</button>
      </div>
      <div class="goals-row">
        <div class="goals-field">
          <label>${m.homeCode} Goles ${m.home}</label>
          <div class="goals-input">
            <button class="goals-dec" data-idx="${i}" data-side="home">−</button>
            <span id="gh-${i}">0</span>
            <button class="goals-inc" data-idx="${i}" data-side="home">+</button>
          </div>
        </div>
        <div class="goals-field">
          <label>${m.awayCode} Goles ${m.away}</label>
          <div class="goals-input">
            <button class="goals-dec" data-idx="${i}" data-side="away">−</button>
            <span id="ga-${i}">0</span>
            <button class="goals-inc" data-idx="${i}" data-side="away">+</button>
          </div>
        </div>
      </div>
    `;

    container.appendChild(card);

    // Attach events AFTER appending (safe references)
    document.getElementById('btn-home-' + i).addEventListener('click', () => selW(i, 'home'));
    document.getElementById('btn-away-' + i).addEventListener('click', () => selW(i, 'away'));
    document.getElementById('btn-draw-' + i).addEventListener('click', () => selW(i, 'draw'));

    card.querySelectorAll('.goals-dec').forEach(btn => {
      btn.addEventListener('click', () => chg(parseInt(btn.dataset.idx), btn.dataset.side, -1));
    });
    card.querySelectorAll('.goals-inc').forEach(btn => {
      btn.addEventListener('click', () => chg(parseInt(btn.dataset.idx), btn.dataset.side, 1));
    });
  });
}

function selW(i,side){
  picks[i].winner = side;

  // Reset all three buttons first
  const bHome = document.getElementById(`btn-home-${i}`);
  const bAway = document.getElementById(`btn-away-${i}`);
  const bDraw = document.getElementById(`btn-draw-${i}`);
  if(bHome) bHome.className = 'pick-btn' + (side==='home' ? ' sel-home' : '');
  if(bAway) bAway.className = 'pick-btn' + (side==='away' ? ' sel-away' : '');
  if(bDraw) bDraw.className = 'draw-btn' + (side==='draw' ? ' sel-draw' : '');

  // Remove error state on this card
  document.getElementById(`mc-${i}`).classList.remove('missing');
  document.getElementById(`miss-${i}`).style.display='none';
  closeBanner();
}

function chg(i,side,delta){
  const k=side==='home'?'homeGoals':'awayGoals';
  picks[i][k]=Math.max(0,picks[i][k]+delta);
  document.getElementById(side==='home'?`gh-${i}`:`ga-${i}`).textContent=picks[i][k];
}

// ── Inline banner (no alert) ──
function showBanner(type,icon,msg){
  const b=document.getElementById('banner');
  b.className=`banner show ${type}`;
  document.getElementById('bannerIcon').textContent=icon;
  document.getElementById('bannerMsg').textContent=msg;
  b.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function closeBanner(){
  document.getElementById('banner').classList.remove('show');
}

function submitPrediction(){
  // Clear previous errors
  MATCHES.forEach((_,i)=>{
    document.getElementById(`mc-${i}`).classList.remove('missing');
    document.getElementById(`miss-${i}`).style.display='none';
  });
  closeBanner();

  const name=document.getElementById('inp-name').value.trim();
  const nameInput=document.getElementById('inp-name');

  if(!name){
    nameInput.classList.add('inp-error');
    showBanner('error','⚠️','Por favor ingresá tu nombre completo para continuar.');
    nameInput.focus();
    nameInput.addEventListener('input',()=>nameInput.classList.remove('inp-error'),{once:true});
    return;
  }

  // Find all missing picks
  const missing=picks.map((p,i)=>p.winner===null?i:-1).filter(i=>i!==-1);
  if(missing.length>0){
    missing.forEach(i=>{
      document.getElementById(`mc-${i}`).classList.add('missing');
      document.getElementById(`miss-${i}`).style.display='inline-flex';
    });
    const names=missing.map(i=>`Partido ${i+1}`).join(', ');
    showBanner('error','⚽',`Elegí Local, Visita o Empate en: ${names}.`);
    // Scroll to first missing
    document.getElementById(`mc-${missing[0]}`).scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }

  const all=load();
  all.push({
    id:Date.now(),name,ts:new Date().toLocaleString('es-PY'),
    picks:MATCHES.map((m,i)=>({
      matchNum:m.num,home:m.home,homeFlag:m.homeFlag,away:m.away,awayFlag:m.awayFlag,
      winner:picks[i].winner,
      winnerName:picks[i].winner==='home'?m.home:picks[i].winner==='away'?m.away:'Empate',
      winnerFlag:picks[i].winner==='home'?m.homeFlag:picks[i].winner==='away'?m.awayFlag:'🤝',
      homeGoals:picks[i].homeGoals,awayGoals:picks[i].awayGoals,
    }))
  });
  save(all);

  // Reset
  picks.forEach((_,i)=>{
    picks[i]={winner:null,homeGoals:0,awayGoals:0};
    ['home','away'].forEach(s=>{const b=document.getElementById(`btn-${s}-${i}`);if(b)b.className='pick-btn';});
    const d=document.getElementById(`btn-draw-${i}`);if(d)d.className='draw-btn';
    document.getElementById(`gh-${i}`).textContent='0';
    document.getElementById(`ga-${i}`).textContent='0';
  });
  document.getElementById('inp-name').value='';
  window.scrollTo({top:0,behavior:'smooth'});
  showToast('🎉 ¡Palpite registrado con éxito!');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}

// ── Report ──
function renderReport(){
  let all=load();
  const fm=document.getElementById('filter-match').value;
  const fs=document.getElementById('filter-sort').value;
  const total=all.length;
  document.getElementById('report-count').textContent=`${total} palpite${total!==1?'s':''} registrado${total!==1?'s':''}`;

  if(total>0){
    const pyP=all.map(r=>r.picks[2]);
    const pyW=pyP.filter(p=>p.winner==='away').length;
    document.getElementById('stats-row').innerHTML=`
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total Palpites</div></div>
      <div class="stat-card"><div class="stat-num">${pyW}</div><div class="stat-label">🇵🇾 Por Paraguay</div></div>
      <div class="stat-card"><div class="stat-num">${total?Math.round(pyW/total*100):0}%</div><div class="stat-label">% Paraguay</div></div>`;
  } else {document.getElementById('stats-row').innerHTML='';}

  if(!all.length){
    document.getElementById('report-summary').innerHTML='';
    document.getElementById('predictions-list').innerHTML=`
      <div class="empty-state">
        <span class="empty-ball">⚽</span>
        <p>Sin palpites todavía.<br>¡Sé el primero del equipo Somax Agro!</p>
      </div>`;
    return;
  }

  const idxs=fm!==''?[parseInt(fm)]:MATCHES.map((_,i)=>i);
  let sumH='';
  idxs.forEach(mi=>{
    const m=MATCHES[mi],v=all.map(r=>r.picks[mi]);
    const tot=v.length,hw=v.filter(x=>x.winner==='home').length,
          dr=v.filter(x=>x.winner==='draw').length,aw=v.filter(x=>x.winner==='away').length;
    const p=n=>tot?Math.round(n/tot*100):0;
    sumH+=`<div class="match-summary">
      <div class="sum-hdr">${m.homeFlag} ${m.home} vs ${m.away} ${m.awayFlag} — P${m.num}</div>
      <div class="win-bars">
        <div class="bar-row"><div class="bar-label">${m.homeFlag} ${m.home}</div>
          <div class="bar-track"><div class="bar-fill bar-home" style="width:${p(hw)}%"></div></div>
          <div class="bar-pct">${p(hw)}%</div></div>
        <div class="bar-row"><div class="bar-label">🤝 Empate</div>
          <div class="bar-track"><div class="bar-fill bar-draw" style="width:${p(dr)}%"></div></div>
          <div class="bar-pct">${p(dr)}%</div></div>
        <div class="bar-row"><div class="bar-label">${m.awayFlag} ${m.away}</div>
          <div class="bar-track"><div class="bar-fill bar-away" style="width:${p(aw)}%"></div></div>
          <div class="bar-pct">${p(aw)}%</div></div>
      </div></div>`;
  });
  document.getElementById('report-summary').innerHTML=sumH;

  if(fs==='name')all=[...all].sort((a,b)=>a.name.localeCompare(b.name));
  let listH='<div class="predictions-list">';
  all.forEach(rec=>{
    const pt=fm!==''?[rec.picks[parseInt(fm)]]:rec.picks;
    listH+=`<div class="pred-card">
      <div class="pred-top">
        <div class="pred-avatar">${rec.name.trim().charAt(0).toUpperCase()}</div>
        <div class="pred-info">
          <div class="pred-name">${rec.name}</div>
          <div class="pred-ts">📅 ${rec.ts}</div>
        </div>
        <button class="del-btn" onclick="delPick(${rec.id})">✕</button>
      </div>
      <div class="pred-picks-grid">`;
    pt.forEach(p=>{
      listH+=`<div class="pred-row">
        <div class="pred-mlbl">P${p.matchNum}</div>
        <div class="pred-winner"><span>${p.winnerFlag}</span>${p.winnerName}</div>
        <div class="pred-score">${p.homeGoals}–${p.awayGoals}</div>
      </div>`;
    });
    listH+=`</div></div>`;
  });
  document.getElementById('predictions-list').innerHTML=listH+'</div>';
}

function delPick(id){
  if(!confirm('¿Eliminar este palpite?'))return;
  save(load().filter(r=>r.id!==id));renderReport();
}

function exportCSV(){
  const all=load();
  if(!all.length){showBanner('error','⚠️','No hay palpites para exportar.');return;}
  let csv='Nombre,Fecha,Partido,Ganador,Goles Local,Goles Visitante\n';
  all.forEach(r=>r.picks.forEach(p=>{
    csv+=`"${r.name}","${r.ts}","P${p.matchNum} ${p.home} vs ${p.away}","${p.winnerName}","${p.homeGoals}","${p.awayGoals}"\n`;
  }));
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='somax-palpites-mundial2026.csv';a.click();
}

function switchTab(tab,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`panel-${tab}`).classList.add('active');
  btn.classList.add('active');
  if(tab==='report')renderReport();
}

buildMatches();
</script>
</body>
</html>
